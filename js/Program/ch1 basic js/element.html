<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 100px;
            height: 100px;
            background-color: aqua;
            margin: 10px;
            text-align: center;
            line-height: 100px;
            font-size: 30px;
            float: left;
        }
    </style>
</head>
<body>
    <div class="box">5</div>
    <div class="box">4</div>
    <div class="box">3</div>
    <div class="box">2</div>
    <div class="box">1       </div>
    <script>

        let box = document.getElementsByClassName("box");
       for(let i=0; i<box.length; i++){
        box[i].style.backgroundColor = "red";
       }
    </script>
</body>
</html>
