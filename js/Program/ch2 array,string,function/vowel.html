<html>
<body>
<script type="text/javascript">
var str = prompt("Enter a String :::");
var vowels = ["a", "e", "i", "o", "u"];
var count = 0;
for(let i=0;i<str.length;i++){

    let a=str[i];
    
    
        if (vowels.includes ( a)) {
            count++;
        }
    
}
document.write("Count of vowels is : "+count);
</script>
</body>
</html>
