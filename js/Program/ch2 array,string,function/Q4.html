<html>
<body>
<script type="text/javascript">
var str = prompt("Enter a String :::");
var vowels = ["a", "e", "i", "o", "u"];
var count = 0;
for (var i of str.toLowerCase()) {
if (vowels.includes ( i )) {
count++;
}
}
document.write("Count of vowels is : "+count);
</script>
</body>
</html>
