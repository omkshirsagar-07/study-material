<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Bubbling</title>
    <style>
        .container {
            width: 300px;
            height: 300px;
            background-color: rgb(28, 49, 56);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box {
            width: 200px;
            height: 200px;
            background-color: rgb(23, 211, 23);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .click {
            width: 100px;
            height: 100px;
            background-color: rgb(154, 0, 0);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
    </style>

</head>
<body>
    <div class="container">
        <div class="box">
            <div class="click">
                click me
            </div>
        </div>
    </div>
    <script>
        let click = document.querySelector('.click').addEventListener('click', function(e) {
            alert('This is click me');
                        e.stopPropagation(); // Stop the event from event bubbling 

        });
        
        let box = document.querySelector('.box').addEventListener('click', function(e) {
            e.stopPropagation(); // Stop the event from event bubbling
            alert('This is box');
        });
        
        let container = document.querySelector('.container').addEventListener('click', function() {
            alert('This is container');
        });
    </script>
</body>
</html>
