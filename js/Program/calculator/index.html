<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <style>
        .cal {
            width: 300px;
            height: 360px;
            border: solid;
            display: flex;
            flex-wrap: wrap;
            flex-direction: column;
            align-items: center;

        }

        .inbox {
            width: 90%;
            height: 10%;
            border: solid;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .inbox input {
            width: 100%;
            height: 100%;
        }

        .btnbox {
            width: 90%;
            height: 80%;
            border: solid;
            margin-top: 10px;
            display: flex;
            justify-content: space-evenly;
            flex-wrap: wrap;
            padding: 3px;
        }
        .btnbox button {
            width: 20%;
            height: 20%;
            margin: 3px;
            font-size: 20px;
        }
    </style>
</head>

<body>
    <article class="cal">
        <section class="inbox">
            <input type="text" id="dis" >
        </section>

            <section class="btnbox">
        
            <button onclick="getvalue(7)">7</button>
            <button onclick="getvalue(8)">8</button>
            <button onclick="getvalue(9)">9</button>
            <button onclick="getvalue('/')">/</button>
            <button onclick="getvalue(4)">4</button>
            <button onclick="getvalue(5)">5</button>
            <button onclick="getvalue(6)">6</button>
            <button onclick="getvalue('*')">*</button>
            <button onclick="getvalue(1)">1</button>
            <button onclick="getvalue(2)">2</button>
            <button onclick="getvalue(3)">3</button>
            <button onclick="getvalue('-')">-</button>
            <button onclick="getvalue(0)">0</button>
            <button onclick="getvalue('.')">.</button>
            <button onclick="cal()">=</button>
            <button onclick="getvalue('+')">+</button>
           
        </section>

        </section>
    </article>


    

    <script>
let display=document.getElementById("dis")
let prevalue=display.value
console.log(prevalue)

function getvalue(value){
    console.log(value);
    if (display.value === "0") {
        display.value = value.toString();
    } else {
        display.value = display.value.toString() + value.toString();
    }
}
   function cal(){
    console.log(display)
    display.toString;
    display.value=eval(display);
   }


    </script>
</body>

</html>
